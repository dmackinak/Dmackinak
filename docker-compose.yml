version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - clips:/app/clips
      - ./settings.json:/app/settings.json
      - whisper_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  uploads:
  clips:
  whisper_cache:
